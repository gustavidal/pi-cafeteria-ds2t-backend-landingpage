components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    # SCHEMAS GERAIS
    Admin:
      required:
        - nome_usuario
        - email
        - senha
      type: object
      properties:
        id:
          type: integer
          minimum: 1
        nome_usuario:
          type: string
          description: O número máximo de caracteres é de 100
          maxLength: 100
          minLength: 6
        email:
          type: string
          format: email
          description: O número máximo de caracteres é de 255
          maxLength: 255
          minLength: 7
        senha:
          type: string
          description: O número máximo de caracteres é de 100
          maxLength: 100
          minLength: 8
    Categoria:
      required:
        - categoria
      type: object
      properties:
        id:
          type: integer
          minimum: 1
        categoria:
          type: string
          description: O número máximo de caracteres é de 45
          maxLength: 45
    Imagem:
      required:
        - url
        - id_produto
      type: object
      properties:
        id:
          type: integer
          minimum: 1
        url:
          type: string
          format: uri
          pattern: '^https?://.+'
          example: 'https://imagem.example.com'
          description: O número máximo de caracteres é de 255
          maxLength: 255
        id_produto:
          type: integer
          minimum: 1
    Produto:
      required:
        - nome
        - descricao
        - preco
      type: object
      properties:
        id:
          type: integer
          minimum: 1
        nome:
          type: string
          description: O número máximo de caracteres é de 100
          maxLength: 100
        descricao:
          type: string
          description: O número máximo de caracteres é ilimitado
        preco:
          type: number
          format: double
          minimum: 0
          maximum: 999.99
        categoria:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                minimum: 1
    Login:
      required:
        - login
        - senha
        - jwt
      type: object
      properties:
        login:
          type: string
          description: O número máximo de caracteres é de 255
          maxLength: 255
          minLength: 6
        senha:
          type: string
          description: O número máximo de caracteres é de 100
          maxLength: 100
          minLength: 8
        jwt:
          type: string
          description: O número máximo de caracteres é de 255
          maxLength: 255
    # SCHEMAS PARA OS GETS
    AdminGet:
      required:
        - id
      type: object
      properties:
        id:
          type: integer
          minimum: 1
        nome_usuario:
          type: string
          maxLength: 100
          minLength: 6
        email:
          type: string
          format: email
          maxLength: 255
        jwt:
          type: string
          maxLength: 255
    CategoriaGet:
      required:
        - id
      type: object
      properties:
        id:
          type: integer
          minimum: 1
        categoria:
          type: string
          maxLength: 45
    ImagemGet:
      required:
        - id
      type: object
      properties:
        id:
          type: integer
          minimum: 1
        url:
          type: string
          format: uri
          pattern: "^https?://.+"
          example: "https://imagem.example.com"
          maxLength: 255
    ProdutoGet:
      required:
        - id
      type: object
      properties:
        id:
          type: integer
          minimum: 1
        nome:
          type: string
          maxLength: 100
        descricao:
          type: string
        preco:
          type: number
          format: double
          minimum: 0
          maximum: 999.99
        imagem:
          type: array
          items:
            $ref: "#/components/schemas/ImagemGet"
        categoria:
          type: array
          items:
            $ref: "#/components/schemas/CategoriaGet"